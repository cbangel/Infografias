<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Generador de infografías</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 style="padding:12px 18px; color:#007ef6;">Generador de infografías</h1>

        <div style="display:flex; gap:20px; padding: 10px 18px;">
            <div style="width:340px; display:flex; flex-direction:column; gap:10px;">
                <div class="api-key-container">
                    <label for="apiKeyInput">API Key</label>
                    <div class="api-row">
                        <input type="password" id="apiKeyInput" placeholder="Introduce tu API key" onchange="saveKeyLocally()">
                        <button id="getApiKeyBtn" onclick="startAuthFlow()">🔑 Obtener</button>
                    </div>
                    <div style="margin-top:8px;">
                        <label>Modelo de imagen</label>
                        <select id="img_model"></select>
                    </div>
                </div>

                <!-- Fuente PDF removed per request -->

                <div>
                    <label>Plantilla</label>
                    <div id="template_list" style="width:100%; height:240px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding-right:6px;">
                        <!-- Thumbnails will be injected here, scrollable -->
                    </div>
                    <input type="hidden" id="object_select" value="page_1">
                </div>

                <div id="controls_row" style="display:flex; gap:8px; align-items:center;">
                    <button class="action-btn" id="genImageBtn">Generar imagen</button>
                    <button class="action-btn" id="downloadBtn">Descargar imagen</button>
                    <button class="action-btn" id="btnEs">Es</button>
                    <button class="action-btn" id="btnEn">En</button>
                </div>

                <div id="system_notice" class="api-key-container" style="display:none; margin-top:6px;">
                    System prompt actualizado
                </div>

                <div>
                    <label>Tema de la infografía</label>
                    <input type="text" id="revista_nombre" placeholder="Ej: Cambio climático" style="width:100%;">
                </div>

                <div>
                    <label>Propósito (educar, persuadir, resumir, divulgar)</label>
                    <input type="text" id="editorial_input" placeholder="Ej: Educar sobre medidas sostenibles" style="width:100%;">
                </div>

                <div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <label style="margin:0;">System prompt (editable)</label>
                        <button id="copyPromptBtn" class="action-btn" type="button" title="Copiar system prompt">Copiar</button>
                    </div>
                    <textarea id="system_prompt" style="width:100%; height:120px;" placeholder="Aquí aparecerá el system prompt generado por la plantilla"></textarea>
                </div>

                <div>
                    <label>Relación de aspecto</label>
                    <select id="img_ratio" style="width:150px;">
                        <option value="vertical">Vertical (9:16)</option>
                        <option value="square" selected>Cuadrado (1:1)</option>
                        <option value="4:3">4:3</option>
                        <option value="3:4">3:4</option>
                    </select>
                </div>
                
                <!-- El selector "Estudio" eliminado: el estilo se define en JSON.txt -->
            </div>

            <div style="flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column;">
                <label>Preview</label>
                <div id="img-container" style="width:420px; height:745px; display:flex; align-items:center; justify-content:center; position:relative;">
                    <img id="img-preview" src="" style="display:none; max-width:100%; max-height:100%; object-fit:cover;">
                    <div id="img_loading" class="loading-text" style="display:none; position:absolute;">Generando imagen</div>
                </div>
            </div>
        </div>
        </div>

        <footer style="padding:10px 18px; color:#666; font-size:13px; text-align:center;">Diseñado por Juan Guillermo Rivera Berrío con tecnología GPT-5 mini</footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.10.217/pdf.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
